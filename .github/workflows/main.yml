name: my project pl

on:
  push:
    branch:
      - main
jobs:
  build:
    runs-on: ubuntu-latest  
    steps:
    - name: copy project
      uses:  actions/checkout@v4
    - name: docker-login
      uses: docker/login-action@v3
      with:
         username: ${{ secrets.DOCKER_USERNAME }} 
         password: ${{ secrets.DOCKER_PASSWORD }}

    - name: tagging docker
      run:  docker tag myproject  amir096/myproject:latest

    - name: pushing container
      run:  docker push amir096/myproject:latest

    - name: Deployment on azure
      uses: azure/webapps-deploy@v3
      with:
       app-name: flaskapp-devops
       publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}   
       images: amir096/myproject:latest    

         
       
    
